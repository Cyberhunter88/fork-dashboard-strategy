name: Release Build

# Builds dist/ and attaches the JS assets to a release created by
# release-please, then publishes it.
#
# Trigger 1 (`release: created`): release-please creates its releases as
# DRAFTS (`draft: true` in release-please-config.json). Drafts are invisible
# to HACS and fire only `created`, never `published`. This job checks out the
# release commit, builds, verifies, uploads all assets to the draft and flips
# it live — release and assets appear atomically, so a HACS update poll can
# never catch an asset-less release. (The old tag-push flow in
# release.yml/release-prerelease.yml had the same atomicity; those workflows
# stay as a manual fallback until this flow is verified, and cannot
# double-fire: the tag created here comes from GITHUB_TOKEN, whose events
# don't trigger workflows.)
#
# Trigger 2 (`workflow_dispatch`): repair path — rebuild and re-attach assets
# for an already-published release/tag. For a failed run on a still-draft
# release, use "Re-run failed jobs" on the run instead (drafts have no tag to
# dispatch against).

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Published release tag to rebuild assets for (e.g. v1.4.0-beta.13)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build + attach dist assets
    runs-on: ubuntu-latest
    steps:
      - name: Determine ref + tag
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # Draft releases have no tag ref yet — release-please sets
            # target_commitish to the release commit's SHA, so build that.
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.release.target_commitish }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: Ensure release commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor HEAD origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # verify-release-version.mjs checks package.json == STRATEGY_VERSION and
      # (only on tag refs) the tag name. Drafts run off a branch/SHA ref, so
      # assert tag == v<package.json version> explicitly here for both paths.
      - name: Verify version consistency
        run: |
          node scripts/verify-release-version.mjs
          pkg=$(node -p "require('./package.json').version")
          if [ "${{ steps.ref.outputs.tag }}" != "v$pkg" ]; then
            echo "::error::Release tag ${{ steps.ref.outputs.tag }} does not match package.json v$pkg"
            exit 1
          fi

      - name: Verify built bundle references
        run: node scripts/verify-release-bundle.mjs

      # gh resolves draft releases by their tag_name even though the git tag
      # doesn't exist yet. --clobber makes the repair path idempotent.
      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.ref.outputs.tag }}" \
            dist/*.js dist/*.js.gz dist/*.js.br dist/*.js.LICENSE.txt \
            --clobber -R "${{ github.repository }}"

      # Publishing the draft creates the git tag at target_commitish and makes
      # the release (with all assets already attached) visible to HACS. The
      # prerelease flag set by release-please is preserved.
      - name: Publish release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ steps.ref.outputs.tag }}" --draft=false -R "${{ github.repository }}"
