name: Release

# LEGACY manual fallback: releases are normally cut by release-please
# (release-please.yml → release-build.yml). This workflow only fires on a
# HUMAN-pushed tag — the tag release-build.yml creates when publishing a
# draft comes from GITHUB_TOKEN, whose events never trigger workflows, so the
# two paths cannot double-fire. Remove this file once the release-please flow
# has shipped a release end-to-end.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    if: ${{ !contains(github.ref_name, '-beta.') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Verify version consistency
        run: node scripts/verify-release-version.mjs
      - name: Verify built bundle references
        run: node scripts/verify-release-bundle.mjs
      - name: Create GitHub release with JS assets
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.js
            dist/*.js.gz
            dist/*.js.br
            dist/*.js.LICENSE.txt
